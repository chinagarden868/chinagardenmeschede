<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="./china-garden-logo-transparent.png">
<title>厨房 · Küche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCX_VIIy83XUlEWWINRbNZusCVVtkhZvdw",
    authDomain:        "china-garden-meschede.firebaseapp.com",
    databaseURL:       "https://china-garden-meschede-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "china-garden-meschede",
    storageBucket:     "china-garden-meschede.firebasestorage.app",
    messagingSenderId: "437982133482",
    appId:             "1:437982133482:web:135c01db3a84e2b5feab93"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  function playSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = i === 0 ? 880 : i === 1 ? 1100 : 1320;
      gain.gain.setValueAtTime(0.4, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.3);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.3);
    });
  }

  // ── Buffet ──────────────────────────────────────────────────
  let prevBuffetCount = null;
  onValue(ref(db, "buffet"), snapshot => {
    const data = snapshot.val() || {};
    const requests = Object.entries(data)
      .map(([key, val]) => ({ key, ...val }))
      .filter(r => r.status === "neu")
      .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    if (prevBuffetCount !== null && requests.length > prevBuffetCount) playSound();
    prevBuffetCount = requests.length;
    renderBuffet(requests);
  });

  window.markBuffetFertig = function(key) {
    update(ref(db, "buffet/" + key), { status: "erledigt" });
  };

  function renderBuffet(requests) {
    const section = document.getElementById("buffet-section");
    const badge   = document.getElementById("buffet-badge");
    badge.textContent = requests.length;
    badge.style.display = requests.length > 0 ? "flex" : "none";
    section.style.display = requests.length > 0 ? "block" : "none";
    const gebraten  = requests.filter(r => r.cat !== "frittiert");
    const frittiert = requests.filter(r => r.cat === "frittiert");
    function makeCards(list) {
      return list.map(r => {
        const levelColor = r.level === "大量" ? "#C0152A" : r.level === "中量" ? "#C9982A" : "#3A8C5C";
        return `<div class="buffet-card">
          <div class="buffet-name">${r.name}</div>
          <div class="buffet-level" style="color:${levelColor}">${r.level}</div>
          <button class="buffet-done" onclick="markBuffetFertig('${r.key}')">✓</button>
        </div>`;
      }).join("");
    }
    document.getElementById("buffet-gebraten").innerHTML = makeCards(gebraten);
    document.getElementById("buffet-frittiert").innerHTML = makeCards(frittiert);
  }

  // ── Bestellungen + Take-Away ─────────────────────────────────
  const CN = {
    "T1":"炒蛋面","T2":"炒蛋饭","T3":"杂烩鸡肉","T4":"四川鸡肉","T5":"咖喱鸡肉",
    "T6":"杂烩猪肉","T7":"菠萝猪肉","T8":"四川猪肉","T9":"杂烩牛肉","T10":"四川牛肉",
    "T11":"洋葱牛肉","T12":"脆皮鸭","T13":"脆皮鸡","T14":"炸鸡柳","T15":"炸鱼片",
    "T16":"素什锦","T17":"豆腐蔬菜",
    "1":"北京牛肉汤","2":"蛋花汤","3":"云吞汤","4":"蔬菜汤","5":"三鲜汤",
    "8":"春卷","8a":"素春卷","9":"青岛小春卷","10":"虾片","13":"炸虾",
    "15":"鸡肉沙爹","16":"双人拼盘","12":"什锦沙拉","14":"鸡肉沙拉","17":"蟹肉沙拉",
    "19":"杂烩鸡肉","20":"沙茶鸡肉","21":"宫保鸡丁","22":"四川鸡肉","23":"西兰花鸡肉",
    "25":"炸鸡肉","26":"鸡肉沙爹","27":"甜酸炸鸡","28":"菠萝甜酸鸡",
    "32":"四川脆皮鸭","33":"菠萝脆皮鸭","35":"广式脆皮鸭","37":"八宝鸭","38":"上海脆皮鸭",
    "41":"杂烩猪肉","42":"四川猪肉","43":"沙茶猪肉","46":"甜酸炸猪肉","47":"八宝什锦",
    "50":"沙茶牛肉","51":"杂烩牛肉","52":"四川牛肉","53":"洋葱牛肉","54":"西兰花牛肉","56":"黑豆牛肉",
    "57":"咖喱牛肉","58":"咖喱猪肉","59":"咖喱鸡肉","60":"咖喱虾","61":"印尼炒饭","62":"印尼炒面",
    "63":"炸鱼片","66":"黑豆鱿鱼","71":"带壳炒虾","72":"宫保虾","73":"炸虾球","77":"炒虾仁",
    "79":"素炒蛋饭","80":"素炒面","81":"什锦豆腐","82":"四川豆腐","83":"大自然珍宝",
    "S1":"素寿司","S2":"海鲜寿司","S3":"什锦寿司拼盘",
    "K1":"炸鸡肉","K2":"蘑菇鸡肉饭","K3":"迷你春卷套餐","K4":"薯条","K5":"炒面或炒饭",
    "85":"鸡肉炒饭","86":"牛肉炒饭","87":"猪肉炒饭","88":"什锦炒饭","89":"鸭肉炒饭",
    "90":"甜酸鸡炒饭","91":"鸡肉炒面","92":"牛肉炒面","93":"猪肉炒面","95":"什锦炒面",
    "96":"虾仁炒面","97":"什锦炒米线","98":"甜酸鸡炒面","99":"鸭肉炒面",
    "D1":"荔枝","D2":"果冻","D3":"蜜糖炸香蕉","D5":"蜜糖炸菠萝","D6":"水果沙拉","D7":"三球冰淇淋"
  };

  let prevOrderCount   = null;
  let prevTakeawayCount = null;

  onValue(ref(db, "bestellungen"), snapshot => {
    const data = snapshot.val() || {};
    const all = Object.entries(data)
      .map(([key, val]) => ({ key, ...val }))
      .filter(o => o.status !== "fertig" && o.status !== "bezahlt")
      .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

    // Tisch-Bestellungen: alles ohne "📞" im Tisch-Label
    const orders   = all.filter(o => !String(o.tisch).includes("📞"));
    // Take-Away: alles mit "📞"
    const takeaway = all.filter(o => String(o.tisch).includes("📞"));

    if (prevOrderCount !== null && orders.length > prevOrderCount) playSound();
    if (prevTakeawayCount !== null && takeaway.length > prevTakeawayCount) playSound();
    prevOrderCount   = orders.length;
    prevTakeawayCount = takeaway.length;

    renderOrders(orders);
    renderTakeaway(takeaway);
  });

  window.markFertig = function(key) {
    update(ref(db, "bestellungen/" + key), { status: "fertig" });
  };
  window.markTakeawayFertig = function(key) {
    update(ref(db, "bestellungen/" + key), { status: "fertig" });
  };

  function itemsHtml(items) {
    return (items || []).map(item => `
      <div class="item-row">
        <span class="item-qty">×${item.qty}</span>
        <span class="item-name">
          <span class="item-cn">${CN[item.id] ? CN[item.id] : item.name}</span>
        </span>
        <span class="item-price">${item.price > 0 ? (item.qty * item.price).toFixed(2) + " €" : ""}</span>
      </div>`).join("");
  }

  function renderOrders(orders) {
    const grid  = document.getElementById("orders-grid");
    const empty = document.getElementById("empty-state");
    const badge = document.getElementById("count-badge");

    badge.textContent = orders.length;
    badge.dataset.active = orders.length > 0 ? "1" : "0";

    if (orders.length === 0) {
      grid.innerHTML = "";
      empty.style.display = "flex";
      return;
    }
    empty.style.display = "none";

    grid.innerHTML = orders.map(order => {
      const total = (order.items || []).reduce((a, i) => a + i.qty * i.price, 0).toFixed(2);
      const time  = order.timestamp
        ? new Date(order.timestamp).toLocaleTimeString("de-DE", { hour:"2-digit", minute:"2-digit" }) : "–";
      return `
      <div class="order-card ${order.status === "neu" ? "is-new" : ""}">
        <div class="card-head">
          <div>
            <div class="tisch-nr">桌 ${order.tisch}</div>
            <div class="tisch-sub">Tisch ${order.tisch}</div>
          </div>
          <div class="head-right">
            ${order.status === "neu" ? '<span class="new-badge">新 NEU</span>' : ''}
            <span class="order-time">${time}</span>
          </div>
        </div>
        <div class="items-list">${itemsHtml(order.items)}</div>
        <div class="card-foot">
          <span class="total">合计 ${total} €</span>
          <button class="fertig-btn" onclick="markFertig('${order.key}')">完成 · Fertig</button>
        </div>
      </div>`;
    }).join("");
  }

  function renderTakeaway(orders) {
    const section = document.getElementById("takeaway-section");
    const list    = document.getElementById("takeaway-list");
    const badge   = document.getElementById("takeaway-badge");

    badge.textContent = orders.length;
    badge.style.display = orders.length > 0 ? "flex" : "none";
    section.style.display = orders.length > 0 ? "block" : "none";

    list.innerHTML = orders.map(order => {
      const time = order.timestamp
        ? new Date(order.timestamp).toLocaleTimeString("de-DE", { hour:"2-digit", minute:"2-digit" }) : "–";
      return `
      <div class="ta-card ${order.status === "neu" ? "is-new" : ""}">
        <div class="ta-head">
          <div class="ta-icon">📞</div>
          <div class="ta-info">
            <div class="ta-name">${order.kundenname || "Telefonkunde"}</div>
            <div class="ta-tel">${order.telefon || ""}</div>
          </div>
          <div class="ta-right">
            ${order.status === "neu" ? '<span class="new-badge">新 NEU</span>' : ''}
            <span class="order-time">${time}</span>
          </div>
        </div>
        <div class="items-list">${itemsHtml(order.items)}</div>
        ${order.notiz ? `<div class="ta-notiz">${order.notiz}</div>` : ""}
        <div class="ta-foot">
          <button class="fertig-btn ta-btn" onclick="markTakeawayFertig('${order.key}')">完成 · Fertig</button>
        </div>
      </div>`;
    }).join("");
  }
</script>

<style>
:root {
  --bg:       #0E0A08;
  --surface:  #1A100C;
  --surface2: #251510;
  --border:   #3A2018;
  --gold:     #C9982A;
  --gold-l:   #F0D080;
  --gold-dim: rgba(201,152,42,0.3);
  --red:      #C0152A;
  --ink:      #F2E8D8;
  --muted:    #8A7060;
  --green:    #3A8C5C;
  --blue:     #2A6FA8;
  --blue-dim: rgba(42,111,168,0.25);
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
}
.top-strip {
  height: 4px;
  background: repeating-linear-gradient(90deg, var(--red) 0,var(--red) 18px, var(--gold) 18px, var(--gold) 24px);
}
header {
  background: var(--surface);
  border-bottom: 1.5px solid var(--gold-dim);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.h-icon { font-size: 26px; }
.h-cn {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 600;
  color: var(--gold-l); letter-spacing: 0.1em;
}
.h-de { font-size: 13px; color: var(--muted); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 14px; }
.live-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--green); color: var(--green);
  font-size: 13px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#count-badge {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 500;
  background: var(--surface2); border: 1.5px solid var(--border); color: var(--muted);
  transition: background 0.3s, border-color 0.3s, color 0.3s;
}
#count-badge[data-active="1"] { background: var(--red); border-color: var(--red); color: white; }

/* ── Haupt-Layout: zwei Spalten ────────────────────────────── */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 0;
  min-height: calc(100dvh - 60px);
}
.col-tisch {
  border-right: 1.5px solid var(--border);
  padding-bottom: 40px;
}
.col-takeaway {
  background: #0C0F14;
  padding-bottom: 40px;
}

/* ── Spalten-Header ─────────────────────────────────────────── */
.col-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 61px; z-index: 5;
}
.col-tisch .col-header { background: var(--surface2); }
.col-takeaway .col-header { background: #111520; }
.col-header-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px; font-weight: 600;
}
.col-tisch .col-header-title { color: var(--gold); }
.col-takeaway .col-header-title { color: #6aaee8; }
.col-badge {
  display: none;
  width: 22px; height: 22px; border-radius: 50%;
  font-size: 12px; align-items: center; justify-content: center;
  font-weight: 600; color: white;
}
#takeaway-badge { background: var(--blue); }
#buffet-badge   { background: var(--red); }

/* ── Buffet ─────────────────────────────────────────────────── */
#buffet-section { display: none; padding: 16px 20px 0; }
.buffet-header {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px; color: var(--gold);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.buffet-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.buffet-col { background: var(--surface2); border-radius: 10px; padding: 10px; }
.buffet-col-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.buffet-list { display: flex; flex-direction: column; gap: 7px; }
.buffet-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 12px;
  display: flex; align-items: center; gap: 8px;
}
.buffet-name { font-family: 'Noto Serif SC', serif; font-size: 16px; color: var(--ink); flex: 1; }
.buffet-level { font-size: 13px; font-weight: 500; }
.buffet-done {
  background: var(--green); color: white; border: none;
  width: 28px; height: 28px; border-radius: 7px;
  font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── Tisch-Bestellungen ─────────────────────────────────────── */
#empty-state {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 50vh; gap: 12px; text-align: center;
}
.empty-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 56px; color: var(--gold); opacity: 0.12; line-height: 1;
}
.empty-text { font-family: 'Noto Serif SC', serif; font-size: 18px; color: var(--muted); }
.empty-sub  { font-size: 13px; color: var(--muted); opacity: 0.5; }
#orders-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px; padding: 20px;
}
.order-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.order-card.is-new { border-color: var(--gold-dim); box-shadow: 0 0 0 1px var(--gold-dim) inset; }
.card-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.tisch-nr {
  font-family: 'Noto Serif SC', serif;
  font-size: 30px; font-weight: 600;
  color: var(--gold-l); line-height: 1; letter-spacing: 0.05em;
}
.tisch-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.head-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.new-badge {
  font-size: 11px; font-weight: 500;
  background: var(--red); color: white;
  padding: 3px 8px; border-radius: 4px; letter-spacing: 0.06em;
}
.order-time { font-size: 12px; color: var(--muted); }
.items-list { padding: 12px 18px; display: flex; flex-direction: column; gap: 9px; }
.item-row { display: flex; align-items: baseline; gap: 8px; }
.item-qty { font-size: 14px; font-weight: 500; color: var(--red); min-width: 26px; flex-shrink: 0; }
.item-name { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.item-cn { font-family: 'Noto Serif SC', serif; font-size: 20px; color: var(--gold-l); letter-spacing: 0.04em; }
.item-price { font-size: 13px; color: var(--muted); white-space: nowrap; }
.card-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 18px 16px; border-top: 1px solid var(--border);
}
.total { font-family: 'Noto Serif SC', serif; font-size: 16px; color: var(--gold); font-weight: 500; }
.fertig-btn {
  background: linear-gradient(135deg, #2D6A4F, #1f4f3a);
  color: white; border: none;
  padding: 11px 22px; border-radius: 10px;
  font-size: 16px; font-weight: 500;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; letter-spacing: 0.05em;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, opacity 0.15s;
}
.fertig-btn:active { transform: scale(0.97); opacity: 0.85; }

/* ── Take-Away Spalte ───────────────────────────────────────── */
#takeaway-section { display: none; }
#takeaway-list { display: flex; flex-direction: column; gap: 14px; padding: 16px; }

.ta-card {
  background: #131926;
  border: 1px solid #1e2d45;
  border-radius: var(--r); overflow: hidden;
  animation: slideIn 0.3s ease;
}
.ta-card.is-new {
  border-color: var(--blue);
  box-shadow: 0 0 0 1px rgba(42,111,168,0.4) inset;
}
.ta-head {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px;
  background: #0e1520;
  border-bottom: 1px solid #1e2d45;
}
.ta-icon { font-size: 22px; line-height: 1; padding-top: 2px; }
.ta-info { flex: 1; }
.ta-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px; color: #a8d4f5; font-weight: 600;
}
.ta-tel { font-size: 12px; color: #4a7090; margin-top: 2px; }
.ta-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.ta-notiz {
  font-size: 11px; color: #4a7090;
  padding: 6px 14px; border-top: 1px solid #1a2535;
  font-style: italic;
}
.ta-foot {
  padding: 10px 14px 14px;
  border-top: 1px solid #1e2d45;
}
.ta-btn {
  width: 100%;
  background: linear-gradient(135deg, #1a4a7a, #0f2d4f);
  font-size: 15px; padding: 11px;
}

/* ── Takeaway leer ──────────────────────────────────────────── */
.ta-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 200px; gap: 8px; text-align: center;
  padding: 30px 20px;
}
.ta-empty-icon { font-size: 36px; opacity: 0.15; }
.ta-empty-text { font-size: 13px; color: var(--muted); opacity: 0.5; }

@media (max-width: 768px) {
  .main-layout { grid-template-columns: 1fr; }
  .col-takeaway { border-top: 2px solid var(--blue); }
}
</style>
</head>
<body>
<div class="top-strip"></div>

<header>
  <div class="header-left">
    <span class="h-icon">🍜</span>
    <div class="h-titles">
      <div class="h-cn">厨房</div>
      <div class="h-de">Küchen-Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-pill">
      <div class="live-dot"></div>
      Live
    </div>
    <div id="count-badge" data-active="0">0</div>
  </div>
</header>
