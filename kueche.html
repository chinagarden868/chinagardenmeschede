<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>厨房 · Küche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

<!-- ════════════════════════════════════════════
     FIREBASE CONFIG — gleiche Werte wie bestellen.html
     ════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCX_VIIy83XUlEWWINRbNZusCVVtkhZvdw",
    authDomain:        "china-garden-meschede.firebaseapp.com",
    databaseURL:       "https://china-garden-meschede-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "china-garden-meschede",
    storageBucket:     "china-garden-meschede.firebasestorage.app",
    messagingSenderId: "437982133482",
    appId:             "1:437982133482:web:135c01db3a84e2b5feab93"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  onValue(ref(db, "bestellungen"), snapshot => {
    const data = snapshot.val() || {};
    const orders = Object.entries(data)
      .map(([key, val]) => ({ key, ...val }))
      .filter(o => o.status !== "fertig")
      .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    renderOrders(orders);
  });

  const CN = {
    "T1":"炒蛋面","T2":"炒蛋饭","T3":"杂烩鸡肉","T4":"四川鸡肉","T5":"咖喱鸡肉",
    "T6":"杂烩猪肉","T7":"菠萝猪肉","T8":"四川猪肉","T9":"杂烩牛肉","T10":"四川牛肉",
    "T11":"洋葱牛肉","T12":"脆皮鸭","T13":"脆皮鸡","T14":"炸鸡柳","T15":"炸鱼片",
    "T16":"素什锦","T17":"豆腐蔬菜",
    "1":"北京牛肉汤","2":"蛋花汤","3":"云吞汤","4":"蔬菜汤","5":"三鲜汤",
    "8":"春卷","8a":"素春卷","9":"青岛小春卷","10":"虾片","13":"炸虾",
    "15":"鸡肉沙爹","16":"双人拼盘",
    "12":"什锦沙拉","14":"鸡肉沙拉","17":"蟹肉沙拉",
    "19":"杂烩鸡肉","20":"沙茶鸡肉","21":"宫保鸡丁","22":"四川鸡肉","23":"西兰花鸡肉",
    "25":"炸鸡肉","26":"鸡肉沙爹","27":"甜酸炸鸡","28":"菠萝甜酸鸡",
    "32":"四川脆皮鸭","33":"菠萝脆皮鸭","35":"广式脆皮鸭","37":"八宝鸭","38":"上海脆皮鸭",
    "41":"杂烩猪肉","42":"四川猪肉","43":"沙茶猪肉","46":"甜酸炸猪肉","47":"八宝什锦",
    "50":"沙茶牛肉","51":"杂烩牛肉","52":"四川牛肉","53":"洋葱牛肉","54":"西兰花牛肉","56":"黑豆牛肉",
    "57":"咖喱牛肉","58":"咖喱猪肉","59":"咖喱鸡肉","60":"咖喱虾","61":"印尼炒饭","62":"印尼炒面",
    "63":"炸鱼片","66":"黑豆鱿鱼","71":"带壳炒虾","72":"宫保虾","73":"炸虾球","77":"炒虾仁",
    "79":"素炒蛋饭","80":"素炒面","81":"什锦豆腐","82":"四川豆腐","83":"大自然珍宝",
    "S1":"素寿司","S2":"海鲜寿司","S3":"什锦寿司拼盘",
    "K1":"炸鸡肉","K2":"蘑菇鸡肉饭","K3":"迷你春卷套餐","K4":"薯条","K5":"炒面或炒饭",
    "85":"鸡肉炒饭","86":"牛肉炒饭","87":"猪肉炒饭","88":"什锦炒饭","89":"鸭肉炒饭",
    "90":"甜酸鸡炒饭","91":"鸡肉炒面","92":"牛肉炒面","93":"猪肉炒面","95":"什锦炒面",
    "96":"虾仁炒面","97":"什锦炒米线","98":"甜酸鸡炒面","99":"鸭肉炒面",
    "D1":"荔枝","D2":"果冻","D3":"蜜糖炸香蕉","D5":"蜜糖炸菠萝","D6":"水果沙拉","D7":"三球冰淇淋"
  };

  window.markFertig = function(key) {
    update(ref(db, "bestellungen/" + key), { status: "fertig" });
  };

  function renderOrders(orders) {
    const grid  = document.getElementById("orders-grid");
    const empty = document.getElementById("empty-state");
    const badge = document.getElementById("count-badge");

    badge.textContent = orders.length;
    badge.dataset.active = orders.length > 0 ? "1" : "0";

    if (orders.length === 0) {
      grid.innerHTML = "";
      empty.style.display = "flex";
      return;
    }
    empty.style.display = "none";

    grid.innerHTML = orders.map(order => {
      const total = (order.items || [])
        .reduce((a, i) => a + i.qty * i.price, 0).toFixed(2);
      const time = order.timestamp
        ? new Date(order.timestamp).toLocaleTimeString("de-DE", { hour:"2-digit", minute:"2-digit" })
        : "–";

      return `
      <div class="order-card ${order.status === "neu" ? "is-new" : ""}">
        <div class="card-head">
          <div>
            <div class="tisch-nr">桌 ${order.tisch}</div>
            <div class="tisch-sub">Tisch ${order.tisch}</div>
          </div>
          <div class="head-right">
            ${order.status === "neu" ? '<span class="new-badge">新 NEU</span>' : ''}
            <span class="order-time">${time}</span>
          </div>
        </div>
        <div class="items-list">
          ${(order.items || []).map(item => `
            <div class="item-row">
              <span class="item-qty">×${item.qty}</span>
              <span class="item-name">
                ${CN[item.id] ? `<span class="item-cn">${CN[item.id]}</span>` : `<span class="item-cn">${item.name}</span>`}
              </span>
              <span class="item-price">${(item.qty * item.price).toFixed(2)} €</span>
            </div>`).join("")}
        </div>
        <div class="card-foot">
          <span class="total">合计 ${total} €</span>
          <button class="fertig-btn" onclick="markFertig('${order.key}')">
            完成 · Fertig
          </button>
        </div>
      </div>`;
    }).join("");
  }
</script>

<style>
:root {
  --bg:       #0E0A08;
  --surface:  #1A100C;
  --surface2: #251510;
  --border:   #3A2018;
  --gold:     #C9982A;
  --gold-l:   #F0D080;
  --gold-dim: rgba(201,152,42,0.3);
  --red:      #C0152A;
  --red-mid:  #8B0D1E;
  --ink:      #F2E8D8;
  --muted:    #8A7060;
  --green:    #3A8C5C;
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
}
.top-strip {
  height: 4px;
  background: repeating-linear-gradient(90deg, var(--red) 0,var(--red) 18px, var(--gold) 18px, var(--gold) 24px);
}
header {
  background: var(--surface);
  border-bottom: 1.5px solid var(--gold-dim);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.h-icon { font-size: 26px; }
.h-titles {}
.h-cn {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 600;
  color: var(--gold-l); letter-spacing: 0.1em;
}
.h-de { font-size: 13px; color: var(--muted); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 14px; }
.live-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--green); color: var(--green);
  font-size: 13px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#count-badge {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 500;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--muted);
  transition: background 0.3s, border-color 0.3s, color 0.3s;
}
#count-badge[data-active="1"] {
  background: var(--red);
  border-color: var(--red);
  color: white;
}
#empty-state {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 65vh; gap: 16px; text-align: center;
}
.empty-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 72px; color: var(--gold);
  opacity: 0.15; line-height: 1;
}
.empty-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px; color: var(--muted); font-weight: 500;
}
.empty-sub { font-size: 14px; color: var(--muted); opacity: 0.6; }
#orders-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px; padding: 24px;
}
.order-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.order-card.is-new {
  border-color: var(--gold-dim);
  box-shadow: 0 0 0 1px var(--gold-dim) inset;
}
.card-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.tisch-nr {
  font-family: 'Noto Serif SC', serif;
  font-size: 32px; font-weight: 600;
  color: var(--gold-l); line-height: 1;
  letter-spacing: 0.05em;
}
.tisch-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
.head-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.new-badge {
  font-size: 11px; font-weight: 500;
  background: var(--red); color: white;
  padding: 3px 9px; border-radius: 4px;
  letter-spacing: 0.06em;
}
.order-time { font-size: 13px; color: var(--muted); }
.items-list { padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }
.item-row { display: flex; align-items: baseline; gap: 10px; }
.item-qty {
  font-size: 14px; font-weight: 500; color: var(--red);
  min-width: 28px; flex-shrink: 0;
}
.item-name { flex: 1; font-size: 20px; font-weight: 400; color: var(--ink); line-height: 1.4; display: flex; flex-direction: column; gap: 2px; }
.item-cn { font-family: 'Noto Serif SC', serif; font-size: 22px; color: var(--gold-l); letter-spacing: 0.05em; }
.item-de { font-size: 14px; color: var(--muted); }
.item-price { font-size: 14px; color: var(--muted); white-space: nowrap; }
.card-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.total {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px; color: var(--gold); font-weight: 500;
}
.fertig-btn {
  background: linear-gradient(135deg, #2D6A4F, #1f4f3a);
  color: white; border: none;
  padding: 13px 26px; border-radius: 10px;
  font-size: 18px; font-weight: 500;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; letter-spacing: 0.05em;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, opacity 0.15s;
}
.fertig-btn:active { transform: scale(0.97); opacity: 0.85; }
@media (min-width: 768px) {
  .tisch-nr   { font-size: 40px; }
  .item-name  { font-size: 22px; }
  .fertig-btn { font-size: 20px; padding: 15px 32px; }
}
</style>
</head>
<body>
<div class="top-strip"></div>
<header>
  <div class="header-left">
    <span class="h-icon">🍜</span>
    <div class="h-titles">
      <div class="h-cn">厨房</div>
      <div class="h-de">Küchen-Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-pill">
      <div class="live-dot"></div>
      Live
    </div>
    <div id="count-badge" data-active="0">0</div>
  </div>
</header>

<div id="empty-state">
  <div class="empty-char">無</div>
  <div class="empty-text">Keine offenen Bestellungen</div>
  <div class="empty-sub">Neue Bestellungen erscheinen sofort hier</div>
</div>

<div id="orders-grid"></div>
</body>
</html>
