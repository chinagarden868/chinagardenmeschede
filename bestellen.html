<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜单 · Speisekarte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCX_VIIy83XUlEWWINRbNZusCVVtkhZvdw",
    authDomain:        "china-garden-meschede.firebaseapp.com",
    databaseURL:       "https://china-garden-meschede-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "china-garden-meschede",
    storageBucket:     "china-garden-meschede.firebasestorage.app",
    messagingSenderId: "437982133482",
    appId:             "1:437982133482:web:135c01db3a84e2b5feab93"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const params  = new URLSearchParams(location.search);
  const tischNr = params.get("tisch") || "?";
  document.getElementById("tisch-label").textContent = "桌号 · Tisch " + tischNr;

  let cart = {};

  window.changeQty = function(id, delta) {
    cart[id] = Math.max(0, (cart[id] || 0) + delta);
    const el = document.getElementById("qty-" + id);
    el.textContent = cart[id];
    el.classList.toggle("has-qty", cart[id] > 0);
    renderCart();
  };

  function renderCart() {
    const total = Object.values(cart).reduce((a, b) => a + b, 0);
    const bar   = document.getElementById("cart-bar");
    if (total > 0) {
      const sum = MENU.flat().reduce((a, item) => a + (cart[item.id] || 0) * item.price, 0);
      document.getElementById("cart-info").textContent =
        total + " 件  ·  " + sum.toFixed(2).replace(".", ",") + " €";
      bar.classList.add("visible");
    } else {
      bar.classList.remove("visible");
    }
  }

  window.bestellungSenden = async function() {
    const allItems = MENU.flat();
    const items = allItems
      .filter(item => (cart[item.id] || 0) > 0)
      .map(item => ({ id: item.id, name: item.name, qty: cart[item.id], price: item.price }));
    if (!items.length) return;

    const btn = document.getElementById("order-btn");
    btn.disabled = true;
    btn.textContent = "传送中 …";

    try {
      await push(ref(db, "bestellungen"), {
        tisch: tischNr, items, status: "neu", timestamp: serverTimestamp()
      });
      cart = {};
      allItems.forEach(item => {
        const el = document.getElementById("qty-" + item.id);
        if (el) { el.textContent = "0"; el.classList.remove("has-qty"); }
      });
      renderCart();
      document.getElementById("success-screen").classList.add("show");
      setTimeout(() => document.getElementById("success-screen").classList.remove("show"), 3500);
    } catch (e) {
      alert("Fehler beim Senden: " + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "下单 · Bestellen";
    }
  };
</script>

<style>
:root {
  --red:      #C0152A;
  --red-dark: #8B0D1E;
  --red-deep: #5C0812;
  --gold:     #C9982A;
  --gold-l:   #F0D080;
  --cream:    #FDF6EC;
  --ink:      #1A0A06;
  --muted:    #7A5A4A;
  --border:   #E8D4B8;
  --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100dvh;
  padding-bottom: 110px;
}
.top-strip {
  height: 5px;
  background: repeating-linear-gradient(90deg, var(--red) 0,var(--red) 18px, var(--gold) 18px, var(--gold) 24px);
}
header {
  background: var(--red-deep);
  padding: 14px 20px 12px;
  position: sticky; top: 0; z-index: 10;
  border-bottom: 2px solid var(--gold);
}
.header-inner { display: flex; align-items: center; gap: 14px; }
.logo-wrap {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.logo-img {
  height: 72px;
  width: auto;
  object-fit: contain;
}
header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px; font-weight: 600;
  color: var(--gold-l); letter-spacing: 0.08em;
}
#tisch-label {
  font-size: 12px; font-weight: 300;
  color: rgba(240,208,128,0.6);
  margin-top: 3px; letter-spacing: 0.04em;
}

/* Category tabs */
.cat-nav {
  display: flex; overflow-x: auto; gap: 0;
  background: var(--red-deep);
  border-bottom: 1px solid rgba(201,152,42,0.3);
  padding: 0 8px 0;
  scrollbar-width: none;
}
.cat-nav::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  padding: 10px 14px;
  font-size: 12px; font-weight: 400;
  color: rgba(240,208,128,0.55);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: 'Noto Sans SC', sans-serif;
}
.cat-tab.active { color: var(--gold-l); border-bottom-color: var(--gold); }

.section-wrap { padding: 20px 14px 0; }
.section-title {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.section-title::before, .section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.section-title span {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; font-weight: 500;
  color: var(--red); letter-spacing: 0.1em;
  white-space: nowrap; padding: 0 4px;
}
.item-card {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--r); padding: 11px 13px; margin-bottom: 7px;
  position: relative; overflow: hidden;
}
.item-card::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--red); opacity: 0; transition: opacity 0.2s;
}
.item-card:has(.has-qty)::before { opacity: 1; }
.item-num {
  font-size: 11px; color: var(--muted);
  min-width: 22px; flex-shrink: 0;
  font-weight: 300;
}
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.item-cn   { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--gold); margin-top: 2px; letter-spacing: 0.05em; }
.item-desc { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; flex-shrink: 0; }
.item-price { font-size: 13px; font-weight: 500; color: var(--red); white-space: nowrap; }
.qty-ctrl { display: flex; align-items: center; gap: 7px; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--cream);
  font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  color: var(--red-dark); font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.qty-btn:active { background: #F5EDD8; }
.qty-num { font-size: 14px; font-weight: 500; min-width: 16px; text-align: center; color: var(--ink); }
.qty-num.has-qty { color: var(--red); }

/* Cart bar */
#cart-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--red-deep); border-top: 2px solid var(--gold);
  color: var(--gold-l); padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 20;
  transform: translateY(110%);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
#cart-bar.visible { transform: translateY(0); }
#cart-info { font-size: 14px; opacity: 0.85; }
#order-btn {
  background: var(--gold); color: var(--red-deep);
  border: none; padding: 10px 20px; border-radius: 8px;
  font-size: 14px; font-weight: 500; font-family: inherit;
  cursor: pointer; letter-spacing: 0.04em;
  transition: opacity 0.15s;
}
#order-btn:disabled { opacity: 0.6; }

/* Success */
#success-screen {
  position: fixed; inset: 0; background: var(--red-deep);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity 0.35s;
  text-align: center; padding: 32px;
}
#success-screen.show { opacity: 1; pointer-events: all; }
.success-char {
  font-family: 'Noto Serif SC', serif; font-size: 80px;
  color: var(--gold); line-height: 1; margin-bottom: 20px;
  animation: dropIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes dropIn {
  from { transform: translateY(-20px) scale(0.8); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
#success-screen h2 {
  font-family: 'Noto Serif SC', serif; font-size: 22px;
  color: var(--gold-l); font-weight: 500; margin-bottom: 8px;
}
#success-screen p { font-size: 14px; color: rgba(240,208,128,0.65); line-height: 1.7; }
.bottom-ornament { text-align: center; padding: 28px 0 16px; font-size: 18px; opacity: 0.2; letter-spacing: 8px; }
</style>
</head>

// Menü aufbauen 
(function buildMenu() {
  const cats = [...new Set(MENU.map(i => i.cat))];
  const container = document.getElementById("menu-container");
  const nav = document.getElementById("cat-nav");

  // Tabs
  cats.forEach((cat, idx) => {
    const btn = document.createElement("button");
    btn.className = "cat-tab" + (idx === 0 ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("sec-" + idx).scrollIntoView({ behavior: "smooth", block: "start" });
    };
    nav.appendChild(btn);
  });

  // Sections
  cats.forEach((cat, idx) => {
    const wrap = document.createElement("div");
    wrap.className = "section-wrap";
    wrap.id = "sec-" + idx;
    wrap.innerHTML = `<div class="section-title"><span>${cat}</span></div>`;

    MENU.filter(i => i.cat === cat).forEach(item => {
      const card = document.createElement("div");
      card.className = "item-card";
      card.innerHTML = `
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          ${item.cn ? `<div class="item-cn">${item.cn}</div>` : ""}
          ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ""}
        </div>
        <div class="item-right">
          <span class="item-price">${item.price.toFixed(2).replace(".", ",")} €</span>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
            <span class="qty-num" id="qty-${item.id}">0</span>
            <button class="qty-btn" onclick="changeQty('${item.id}',+1)">+</button>
          </div>
        </div>`;
      wrap.appendChild(card);
    });
    container.appendChild(wrap);
  });
})();
</script>
